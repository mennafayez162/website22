<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الأبحاث العلمية - EANSR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #0A2D56, #1a4b7a);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        .page-header h1 { font-size: 2.5em; font-weight: 900; }
        .page-header h1 span { color: #FF6B35; }
        .page-content { padding: 60px 20px; max-width: 1000px; margin: 0 auto; }
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .article-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-right: 4px solid #FF6B35;
            transition: 0.3s;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .article-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .article-card h3 { color: #0A2D56; margin-bottom: 10px; }
        .article-card .category {
            display: inline-block;
            background: #FF6B35;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .article-card p { color: #666; font-size: 0.95em; line-height: 1.8; }
        .article-card .date { color: #999; font-size: 0.8em; margin-top: 10px; display: block; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #FF6B35;
            font-weight: 700;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .back-link:hover { gap: 15px; }
        .empty-message { text-align: center; color: #999; padding: 40px; grid-column: 1/-1; }
        .header {
            background: #0A2D56;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo img { height: 50px; width: auto; border-radius: 8px; }
        .logo-text h1 { font-weight: 900; font-size: 1.6em; margin: 0; }
        .logo-text p { font-size: 0.6em; opacity: 0.85; margin: 0; }
        .footer { background: #0A2D56; color: white; padding: 30px 20px; text-align: center; }
        .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; font-size: 0.9em; opacity: 0.7; }
        .developer-name { color: #FF6B35; font-weight: 700; }
        @media (max-width: 768px) { .page-header h1 { font-size: 1.8em; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="شعار الجمعية">
                <div class="logo-text">
                    <h1>EANSR</h1>
                    <p>الجمعية المصرية للتأهيل العصبي والعمود الفقري</p>
                </div>
            </div>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>مراجعة <span>الأبحاث العلمية</span></h1>
            <p style="opacity:0.8;font-size:1.1em;">مراجعات لأحدث الأبحاث في مجال التأهيل العصبي</p>
        </div>
    </section>

    <section class="page-content">
        <div class="container">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
            <div id="articlesContainer" class="articles-grid">
                <p class="empty-message">⏳ جاري تحميل المقالات...</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>جميع الحقوق محفوظة © 2026 EANSR</p>
                <p>تم التطوير بواسطة <span class="developer-name">Menna Fayez</span></p>
            </div>
        </div>
    </footer>

    <script>
        const API = 'http://localhost:5000/api';

        async function loadResearchArticles() {
            const container = document.getElementById('articlesContainer');
            try {
                const res = await fetch(`${API}/articles?category=research`);
                const data = await res.json();
                if (data.success && data.data.length > 0) {
                    const articles = data.data.filter(a => a.published !== false);
                    if (articles.length === 0) {
                        container.innerHTML = '<p class="empty-message">📭 لا توجد مراجعات أبحاث حالياً</p>';
                        return;
                    }
                    container.innerHTML = articles.map(article => `
                        <div class="article-card">
                            ${article.image ? `<img src="${article.image}" alt="${article.title}">` : ''}
                            <span class="category">مراجعة أبحاث</span>
                            <h3>${article.title}</h3>
                            <p>${article.summary || article.content?.substring(0, 120) + '...' || 'لا يوجد ملخص'}</p>
                            <span class="date">📅 ${new Date(article.createdAt).toLocaleDateString('ar-EG')}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="empty-message">📭 لا توجد مراجعات أبحاث حالياً</p>';
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                container.innerHTML = '<p class="empty-message" style="color:#dc3545;">⚠️ حدث خطأ في تحميل المحتوى</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadResearchArticles);
    </script>

</body>
</html>
