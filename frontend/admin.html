<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - EANSR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f0f2f5; direction:rtl; }
        .login-page { display:flex; min-height:100vh; background:linear-gradient(135deg,#0A2D56,#1a4b7a); justify-content:center; align-items:center; }
        .login-box { background:white; padding:40px; border-radius:12px; width:100%; max-width:400px; box-shadow:0 8px 40px rgba(0,0,0,0.2); text-align:center; }
        .login-box h2 { color:#0A2D56; }
        .login-box input { width:100%; padding:12px; margin-bottom:15px; border:2px solid #ddd; border-radius:8px; font-size:16px; text-align:right; }
        .login-box input:focus { border-color:#FF6B35; outline:none; }
        .login-box button { width:100%; padding:12px; background:#FF6B35; color:white; border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer; }
        .login-box button:hover { background:#e55a2b; }
        .error-msg { color:#dc3545; display:none; margin-bottom:15px; }
        .admin-panel { display:none; padding:20px; max-width:1200px; margin:0 auto; }
        .admin-header { background:white; padding:20px 30px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .admin-header button { background:none; border:none; color:#dc3545; cursor:pointer; font-size:16px; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:20px; }
        .stat-card { background:white; padding:25px; border-radius:12px; text-align:center; }
        .stat-card .number { font-size:2.5em; font-weight:900; color:#0A2D56; }
        .stat-card .label { color:#666; }
        .articles-box { background:white; padding:25px; border-radius:12px; }
        .articles-box .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
        .btn-add { background:#FF6B35; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-add:hover { background:#e55a2b; }
        table { width:100%; border-collapse:collapse; }
        th { text-align:right; padding:12px; border-bottom:2px solid #eee; color:#0A2D56; }
        td { padding:12px; border-bottom:1px solid #eee; }
        .btn-edit { background:#0A2D56; color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer; }
        .btn-delete { background:#dc3545; color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999; }
        .modal-content { background:white; padding:30px; border-radius:12px; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; }
        .modal-content input,.modal-content textarea,.modal-content select { width:100%; padding:10px; margin-bottom:15px; border:2px solid #ddd; border-radius:8px; font-size:16px; font-family:inherit; }
        .modal-content textarea { height:150px; resize:vertical; }
        .modal-content label { display:block; font-weight:600; margin-bottom:5px; }
        .modal-actions { display:flex; gap:10px; margin-top:15px; }
        .btn-save { background:#28a745; color:white; border:none; padding:10px 30px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-cancel { background:#6c757d; color:white; border:none; padding:10px 30px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .status-badge { padding:4px 12px; border-radius:20px; font-size:0.8em; font-weight:600; }
        .status-published { background:#d4edda; color:#155724; }
        .status-draft { background:#fff3cd; color:#856404; }
        @media(max-width:768px){ .admin-header { flex-direction:column; gap:10px; } table{font-size:0.8em;} }
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="login-box">
        <h2>🔐 EANSR</h2>
        <p>لوحة التحكم</p>
        <div id="errorMsg" class="error-msg">⚠️ بيانات غير صحيحة</div>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">تسجيل الدخول</button>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <h2>📊 لوحة التحكم</h2>
        <div>
            <span id="userName" style="margin-left:15px;">admin</span>
            <button onclick="logout()">🚪 تسجيل الخروج</button>
        </div>
    </div>
    <div class="stats">
        <div class="stat-card"><div class="number" id="totalArticles">0</div><div class="label">المقالات</div></div>
        <div class="stat-card"><div class="number" id="totalViews">0</div><div class="label">مشاهدات</div></div>
    </div>
    <div class="articles-box">
        <div class="top-bar">
            <h3>📝 المقالات</h3>
            <button class="btn-add" onclick="openAddModal()">➕ إضافة مقالة</button>
        </div>
        <table>
            <thead><tr><th>العنوان</th><th>القسم</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
            <tbody id="articlesTable"><tr><td colspan="4" style="text-align:center;color:#999;">جاري التحميل...</td></tr></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">إضافة مقالة</h3>
        <input type="hidden" id="articleId">
        <input type="text" id="formTitle" placeholder="عنوان المقالة">
        <input type="text" id="formSummary" placeholder="ملخص قصير">
        <select id="formCategory">
            <option value="article">مقالة علمية</option>
            <option value="research">مراجعة أبحاث</option>
            <option value="journal">مجلة EANSR</option>
            <option value="news">أخبار</option>
            <option value="gallery">معرض الصور</option>
        </select>
        <textarea id="formContent" placeholder="محتوى المقالة..."></textarea>
        <input type="text" id="formImage" placeholder="رابط الصورة (اختياري)">
        <label><input type="checkbox" id="formPublished" checked> منشور</label>
        <div class="modal-actions">
            <button class="btn-save" onclick="saveArticle()">💾 حفظ</button>
            <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    const API = 'http://localhost:5000/api';
    let token = localStorage.getItem('token');

    async function login() {

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const error = document.getElementById('errorMsg');

    try {

        const res = await fetch(`${API}/auth/login`, {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                username: username,
                password: password
            })

        });


        console.log("Login Status:", res.status);


        const data = await res.json();


        console.log("Login Response:", data);



        if (data.success) {


            token = data.data.token;


            localStorage.setItem('token', token);



            document.getElementById('loginPage').style.display = 'none';

            document.getElementById('adminPanel').style.display = 'block';



            document.getElementById('userName').textContent =
                data.data.user.username;



            loadArticles();



            error.style.display = 'none';



        } else {


            error.textContent =
                data.message || 'بيانات غير صحيحة';


            error.style.display = 'block';


        }



    } catch (e) {


        console.error("LOGIN ERROR:", e);



        error.textContent =
            '⚠️ ' + e.message;



        error.style.display = 'block';


    }

} 

    if (token) {
        fetch(`${API}/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('userName').textContent = data.data.username;
                loadArticles();
            } else {
                localStorage.removeItem('token');
            }
        });
    }

    async function loadArticles() {
        try {
            const res = await fetch(`${API}/articles`);
            const data = await res.json();
            if (data.success) {
                const articles = data.data;
                document.getElementById('totalArticles').textContent = articles.length;
                const views = articles.reduce((sum, a) => sum + (a.views || 0), 0);
                document.getElementById('totalViews').textContent = views;
                const tbody = document.getElementById('articlesTable');
                if (articles.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;">لا توجد مقالات</td></tr>';
                    return;
                }
                tbody.innerHTML = articles.map(a => `
                    <tr>
                        <td><strong>${a.title}</strong></td>
                        <td>${getCategory(a.category)}</td>
                        <td><span class="status-badge ${a.published ? 'status-published' : 'status-draft'}">${a.published ? '✅ منشور' : '📝 مسودة'}</span></td>
                        <td>
                            <button class="btn-edit" onclick="editArticle('${a._id}')">✏️</button>
                            <button class="btn-delete" onclick="deleteArticle('${a._id}')">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }

    function getCategory(cat) {
        const map = { 'research':'مراجعة أبحاث', 'article':'مقالة علمية', 'journal':'مجلة EANSR', 'news':'أخبار', 'gallery':'معرض الصور' };
        return map[cat] || cat;
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = '➕ إضافة مقالة جديدة';
        document.getElementById('articleId').value = '';
        document.getElementById('formTitle').value = '';
        document.getElementById('formSummary').value = '';
        document.getElementById('formContent').value = '';
        document.getElementById('formImage').value = '';
        document.getElementById('formCategory').value = 'article';
        document.getElementById('formPublished').checked = true;
        document.getElementById('modal').style.display = 'flex';
    }

    async function editArticle(id) {
        try {
            const res = await fetch(`${API}/articles/${id}`);
            const data = await res.json();
            if (data.success) {
                const a = data.data;
                document.getElementById('modalTitle').textContent = '✏️ تعديل المقالة';
                document.getElementById('articleId').value = a._id;
                document.getElementById('formTitle').value = a.title;
                document.getElementById('formSummary').value = a.summary || '';
                document.getElementById('formContent').value = a.content;
                document.getElementById('formImage').value = a.image || '';
                document.getElementById('formCategory').value = a.category || 'article';
                document.getElementById('formPublished').checked = a.published !== false;
                document.getElementById('modal').style.display = 'flex';
            }
        } catch(e) { alert('❌ خطأ في تحميل المقالة'); }
    }

    async function saveArticle() {
        const data = {
            title: document.getElementById('formTitle').value,
            summary: document.getElementById('formSummary').value,
            category: document.getElementById('formCategory').value,
            content: document.getElementById('formContent').value,
            image: document.getElementById('formImage').value,
            published: document.getElementById('formPublished').checked
        };
        if (!data.title || !data.content) {
            alert('⚠️ الرجاء ملء العنوان والمحتوى');
            return;
        }
        try {
            const id = document.getElementById('articleId').value;
            const url = id ? `${API}/articles/${id}` : `${API}/articles`;
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                closeModal();
                loadArticles();
                alert(id ? '✅ تم التعديل' : '✅ تم الإضافة');
            } else {
                alert('❌ ' + result.message);
            }
        } catch(e) { alert('❌ خطأ في الحفظ'); }
    }

    async function deleteArticle(id) {
        if (!confirm('هل أنت متأكد؟')) return;
        try {
            const res = await fetch(`${API}/articles/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) { loadArticles(); alert('✅ تم الحذف'); }
            else { alert('❌ ' + data.message); }
        } catch(e) { alert('❌ خطأ في الحذف'); }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
    function logout() {
        localStorage.removeItem('token');
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
    }
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>
</body>
</html>
