<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجلة EANSR - قريباً</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #0A2D56, #1a4b7a);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        .page-header h1 { font-size: 2.5em; font-weight: 900; }
        .page-header h1 span { color: #FF6B35; }
        .page-content { padding: 60px 20px; max-width: 1000px; margin: 0 auto; }
        .coming-soon {
            text-align: center;
            padding: 80px 20px;
        }
        .coming-soon .icon { font-size: 5em; color: #FF6B35; margin-bottom: 20px; }
        .coming-soon h2 { font-size: 2.5em; color: #0A2D56; }
        .coming-soon p { font-size: 1.2em; color: #666; max-width: 500px; margin: 20px auto; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #FF6B35;
            font-weight: 700;
            margin-top: 30px;
            transition: 0.3s;
            padding: 12px 30px;
            border: 2px solid #FF6B35;
            border-radius: 50px;
        }
        .back-link:hover { gap: 15px; background: #FF6B35; color: white; }
        .header {
            background: #0A2D56;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo img { height: 50px; width: auto; border-radius: 8px; }
        .logo-text h1 { font-weight: 900; font-size: 1.6em; margin: 0; }
        .logo-text p { font-size: 0.6em; opacity: 0.85; margin: 0; }
        .footer { background: #0A2D56; color: white; padding: 30px 20px; text-align: center; }
        .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; font-size: 0.9em; opacity: 0.7; }
        .developer-name { color: #FF6B35; font-weight: 700; }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="شعار الجمعية">
                <div class="logo-text">
                    <h1>EANSR</h1>
                    <p>الجمعية المصرية للتأهيل العصبي والعمود الفقري</p>
                </div>
            </div>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>مجلة <span>EANSR</span></h1>
            <p style="opacity:0.8;font-size:1.1em;">مجلة علمية تنشر أحدث الأبحاث والدراسات</p>
        </div>
    </section>

    <section class="page-content">
        <div class="container">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
            <div class="coming-soon">
                <div class="icon"><i class="fas fa-book-open"></i></div>
                <h2>📖 قريباً</h2>
                <p>جاري التحضير لإطلاق العدد الأول من مجلة EANSR.<br>ترقبوا أحدث الأبحاث والدراسات في مجال التأهيل العصبي.</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>جميع الحقوق محفوظة © 2026 EANSR</p>
                <p>تم التطوير بواسطة <span class="developer-name">Menna Fayez</span></p>
            </div>
        </div>
    </footer>

</body>
</html>
