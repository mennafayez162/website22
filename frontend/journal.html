<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجلة EANSR - EANSR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header { background: linear-gradient(135deg, #0A2D56, #1a4b7a); color: white; padding: 60px 20px; text-align: center; }
        .page-header h1 { font-size: 2.5em; font-weight: 900; }
        .page-header h1 span { color: #FF6B35; }
        .page-content { padding: 60px 20px; max-width: 1000px; margin: 0 auto; }
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .article-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-right: 4px solid #FF6B35; transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .article-card:hover { transform: translateY(-5px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        .article-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background: #f0f2f5; }
        .article-card h3 { color: #0A2D56; margin-bottom: 10px; }
        .article-card .category { display: inline-block; background: #FF6B35; color: white; padding: 2px 12px; border-radius: 20px; font-size: 0.7em; font-weight: 600; margin-bottom: 10px; }
        .article-card p { color: #666; font-size: 0.95em; line-height: 1.8; }
        .article-card .date { color: #999; font-size: 0.8em; margin-top: 10px; display: block; }
        .article-card .read-more { display: inline-flex; align-items: center; gap: 6px; color: #FF6B35; font-weight: 700; margin-top: 12px; }
        .article-card .pdf-badge { display:inline-flex; align-items:center; gap:4px; background:#dc3545; color:white; padding:2px 10px; border-radius:20px; font-size:0.7em; font-weight:600; margin-right:5px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #FF6B35; font-weight: 700; margin-bottom: 30px; transition: 0.3s; }
        .back-link:hover { gap: 15px; }
        .empty-message { text-align: center; color: #999; padding: 40px; grid-column: 1/-1; }
        .coming-soon { text-align: center; padding: 60px 20px; }
        .coming-soon .icon { font-size: 4em; color: #FF6B35; margin-bottom: 15px; }
        .coming-soon h2 { font-size: 2em; color: #0A2D56; margin-bottom: 10px; }
        .coming-soon p { font-size: 1.1em; color: #666; }
        .header { background: #0A2D56; color: white; padding: 12px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
        .header .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo img { height: 50px; width: auto; border-radius: 8px; }
        .logo-text h1 { font-weight: 900; font-size: 1.6em; margin: 0; }
        .logo-text p { font-size: 0.6em; opacity: 0.85; margin: 0; }
        .footer { background: #0A2D56; color: white; padding: 30px 20px; text-align: center; }
        .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; font-size: 0.9em; opacity: 0.7; }
        .developer-name { color: #FF6B35; font-weight: 700; }
        @media (max-width: 768px) { .page-header h1 { font-size: 1.8em; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="شعار الجمعية">
                <div class="logo-text">
                    <h1>EANSR</h1>
                    <p>الجمعية المصرية للتأهيل العصبي والعمود الفقري</p>
                </div>
            </div>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>مجلة <span>EANSR</span></h1>
            <p style="opacity:0.8;font-size:1.1em;">مجلة علمية تنشر احدث الابحاث والدراسات</p>
        </div>
    </section>

    <section class="page-content">
        <div class="container">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
            <div id="articlesContainer" class="articles-grid">
                <p class="empty-message">جاري تحميل الاعدادات...</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>جميع الحقوق محفوظة &copy; 2026 EANSR</p>
                <p>تم التطوير بواسطة <span class="developer-name">Menna Fayez</span></p>
            </div>
        </div>
    </footer>

    <script>
        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000/api'
            : '/api';

        async function fetchWithRetry(url, options = {}, retries = 3, delayMs = 4000) {
            for (let attempt = 1; attempt <= retries; attempt++) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 15000);
                    const res = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(timeout);
                    return res;
                } catch (err) {
                    if (attempt === retries) throw err;
                    await new Promise(r => setTimeout(r, delayMs));
                }
            }
        }

        async function loadJournal() {
            const container = document.getElementById('articlesContainer');
            try {
                const res = await fetchWithRetry(`${API}/articles?category=journal`);
                const data = await res.json();
                if (data.success && data.data.length > 0) {
                    const articles = data.data.filter(a => a.published !== false);
                    if (articles.length === 0) {
                        showComingSoon(container);
                        return;
                    }
                    container.innerHTML = articles.map(a => `
                        <a href="article.html?id=${a.id}" class="article-card">
                            ${a.image ? `<img src="${a.image}" alt="${a.title}">` : ''}
                            <span class="category">مجلة EANSR</span>
                            ${a.pdf ? '<span class="pdf-badge"><i class="fas fa-file-pdf"></i> PDF</span>' : ''}
                            <h3>${a.title}</h3>
                            <p>${a.summary || (a.content ? a.content.replace(/<[^>]*>/g, '').substring(0, 150) + '...' : 'لا يوجد ملخص')}</p>
                            <span class="date">${new Date(a.created_at).toLocaleDateString('ar-EG', {year:'numeric',month:'long',day:'numeric'})}</span>
                            <span class="read-more">اقرأ المزيد <i class="fas fa-arrow-left"></i></span>
                        </a>
                    `).join('');
                } else {
                    showComingSoon(container);
                }
            } catch (error) {
                showComingSoon(container);
            }
        }

        function showComingSoon(container) {
            container.innerHTML = `
                <div class="coming-soon" style="grid-column:1/-1;">
                    <div class="icon"><i class="fas fa-book-open"></i></div>
                    <h2>قريباً</h2>
                    <p>جاري التحضير لاصدار العدد الاول من مجلة EANSR.<br>ترقبوا احدث الابحاث والدراسات في مجال التأهيل العصبي.</p>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadJournal);
    </script>
</body>
</html>
